<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trida</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f0ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 48px 40px 40px;
      box-shadow: 0 8px 40px rgba(120, 80, 200, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 320px;
      width: 90%;
    }

    .bubble {
      background: white;
      border: 2px solid #e8e0f5;
      border-radius: 20px;
      padding: 10px 18px;
      font-size: 15px;
      color: #5a4a6a;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(120, 80, 200, 0.08);
    }

    .cat-wrapper {
      width: 180px;
    }

    .cat-wrapper svg {
      width: 100%;
      height: auto;
      filter: drop-shadow(0 12px 32px rgba(176, 96, 48, 0.2));
      animation: cat-bob 2.8s ease-in-out infinite;
    }

    @keyframes cat-bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .tail {
      transform-box: view-box;
      transform-origin: 145px 218px;
      animation: tail-sway 3s ease-in-out infinite;
      animation-delay: -1s;
    }

    @keyframes tail-sway {
      0%, 100% { transform: rotate(0deg); }
      50%       { transform: rotate(18deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bubble">Schnurr... weiter so! 🐾</div>

    <div class="cat-wrapper">

      </svg>
    </div>

</body>
</html>
