<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gadse</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fef5f7 0%, #f0f4ff 50%, #f5f0ff 100%); }
  .cat-wrap { display: flex; flex-direction: column; align-items: center; }
  .cat { width: 140px; height: auto; filter: drop-shadow(0 4px 12px rgba(155, 126, 212, 0.2)); animation: bob 3s ease-in-out infinite; cursor: pointer; }
  @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-6px) rotate(2deg); } }
  .cat-speech { display: inline-block; background: white; padding: 8px 14px; border-radius: 16px; font-size: 12px; color: #7a6890; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; box-shadow: 0 2px 8px rgba(155, 126, 212, 0.15); margin-bottom: 8px; position: relative; cursor: pointer; }
  .cat-speech::after { content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid white; }
</style>
</head>
<body>
<div class="cat-wrap">
  <div class="cat-speech" id="cat-speech">Schnurr… 🐾</div>
  <svg class="cat" viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
    <path d="M 155 130 Q 185 110 180 75 Q 178 60 168 62 Q 162 64 164 75 Q 168 95 150 115" fill="#f4b8a8" stroke="#3a2c4a" stroke-width="2.5" stroke-linejoin="round"/>
    <ellipse cx="100" cy="135" rx="50" ry="35" fill="#ffd4c4" stroke="#3a2c4a" stroke-width="2.5"/>
    <ellipse cx="100" cy="145" rx="28" ry="18" fill="#fff0e8"/>
    <circle cx="100" cy="85" r="42" fill="#ffd4c4" stroke="#3a2c4a" stroke-width="2.5"/>
    <path d="M 68 60 L 62 30 L 88 52 Z" fill="#ffd4c4" stroke="#3a2c4a" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 70 52 L 68 38 L 82 50 Z" fill="#ffb8c8"/>
    <path d="M 132 60 L 138 30 L 112 52 Z" fill="#ffd4c4" stroke="#3a2c4a" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M 130 52 L 132 38 L 118 50 Z" fill="#ffb8c8"/>
    <circle cx="72" cy="95" r="7" fill="#ffb8c8" opacity="0.6"/>
    <circle cx="128" cy="95" r="7" fill="#ffb8c8" opacity="0.6"/>
    <path d="M 80 82 Q 86 76 92 82" fill="none" stroke="#3a2c4a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 108 82 Q 114 76 120 82" fill="none" stroke="#3a2c4a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 96 92 L 104 92 L 100 97 Z" fill="#d4729a" stroke="#3a2c4a" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 100 97 Q 100 102 95 103" fill="none" stroke="#3a2c4a" stroke-width="2" stroke-linecap="round"/>
    <path d="M 100 97 Q 100 102 105 103" fill="none" stroke="#3a2c4a" stroke-width="2" stroke-linecap="round"/>
    <line x1="60" y1="92" x2="75" y2="95" stroke="#3a2c4a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="60" y1="100" x2="75" y2="100" stroke="#3a2c4a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="140" y1="92" x2="125" y2="95" stroke="#3a2c4a" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="140" y1="100" x2="125" y2="100" stroke="#3a2c4a" stroke-width="1.5" stroke-linecap="round"/>
    <rect x="78" y="138" width="44" height="28" fill="#c4a9e8" stroke="#3a2c4a" stroke-width="2" rx="2"/>
    <line x1="100" y1="138" x2="100" y2="166" stroke="#3a2c4a" stroke-width="2"/>
    <line x1="84" y1="146" x2="96" y2="146" stroke="#fff" stroke-width="1.2"/>
    <line x1="84" y1="152" x2="96" y2="152" stroke="#fff" stroke-width="1.2"/>
    <line x1="84" y1="158" x2="94" y2="158" stroke="#fff" stroke-width="1.2"/>
    <line x1="104" y1="146" x2="116" y2="146" stroke="#fff" stroke-width="1.2"/>
    <line x1="104" y1="152" x2="116" y2="152" stroke="#fff" stroke-width="1.2"/>
    <line x1="104" y1="158" x2="114" y2="158" stroke="#fff" stroke-width="1.2"/>
    <ellipse cx="78" cy="165" rx="9" ry="6" fill="#ffd4c4" stroke="#3a2c4a" stroke-width="2"/>
    <ellipse cx="122" cy="165" rx="9" ry="6" fill="#ffd4c4" stroke="#3a2c4a" stroke-width="2"/>
  </svg>
</div>
<script>
  const messages = [
    "Schnurr… 🐾",
    "Du schaffst das! 📖",
    "Lebe mit Herz! 💜",
    "Ein Schritt nach dem anderen ✨",
    "Stolz auf dich! 🌸",
    "Kaffee oder Tee? ☕",
    "Pause ist auch produktiv 🍵",
    "Trau dich! 🌟"
  ];
  const speech = document.getElementById("cat-speech");
  document.querySelector(".cat-wrap").addEventListener("click", () => {
    speech.textContent = messages[Math.floor(Math.random() * messages.length)];
  });
</script>
</body>
</html>
