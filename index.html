<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gadse</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fef5f7 0%, #f0f4ff 50%, #f5f0ff 100%); }
  .cat-wrap { display: flex; flex-direction: column; align-items: center; }
  .cat { width: 140px; height: auto; filter: drop-shadow(0 4px 12px rgba(155, 126, 212, 0.2)); animation: bob 3s ease-in-out infinite; cursor: pointer; }
  @keyframes bob { 0%, 100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-6px) rotate(2deg); } }
  .cat-speech { display: inline-block; background: white; padding: 8px 14px; border-radius: 16px; font-size: 12px; color: #7a6890; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; box-shadow: 0 2px 8px rgba(155, 126, 212, 0.15); margin-bottom: 8px; position: relative; cursor: pointer; }
  .cat-speech::after { content: ""; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 6px solid white; }
</style>
</head>
<body>
<div class="cat-wrap">
  <div class="cat-speech" id="cat-speech">Schnurr… 🐾</div>
  <img class="cat" src="cat.svg" alt="cat">
</div>
<script>
  const messages = [
    "Schnurr… 🐾",
    "Du schaffst das! 📖",
    "Lebe mit Herz! 💜",
    "Ein Schritt nach dem anderen ✨",
    "Stolz auf dich! 🌸",
    "Kaffee oder Tee? ☕",
    "Pause ist auch produktiv 🍵",
    "Trau dich! 🌟"
  ];
  const speech = document.getElementById("cat-speech");
  document.querySelector(".cat-wrap").addEventListener("click", () => {
    speech.textContent = messages[Math.floor(Math.random() * messages.length)];
  });
</script>
</body>
</html>
