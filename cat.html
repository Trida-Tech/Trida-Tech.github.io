<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kawaii Reading Cat</title>
  <link rel="stylesheet" href="cat.css">
</head>
<body>
  <svg class="cat" viewBox="0 0 200 278" xmlns="http://www.w3.org/2000/svg"
       role="img" aria-label="Kawaii cat sitting and reading a book">

    <!-- Tail (behind everything, curves to the right) -->
    <g class="tail">
      <path d="M 145 218 Q 188 242 180 190 Q 170 152 148 172"
            stroke="#b07848" stroke-width="17" fill="none" stroke-linecap="round"/>
      <path d="M 145 218 Q 188 242 180 190 Q 170 152 148 172"
            stroke="#e8a87c" stroke-width="10" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Body -->
    <ellipse cx="100" cy="183" rx="53" ry="49" fill="#e8a87c" stroke="#b07848" stroke-width="3"/>

    <!-- Belly -->
    <ellipse cx="100" cy="199" rx="29" ry="35" fill="#fce8d8" stroke="#d4a88a" stroke-width="1.5"/>

    <!-- Left arm (reaching forward/down to book) -->
    <path d="M 60 202 C 48 220 50 238 63 244"
          stroke="#b07848" stroke-width="19" fill="none" stroke-linecap="round"/>
    <path d="M 60 202 C 48 220 50 238 63 244"
          stroke="#e8a87c" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Right arm (reaching forward/down to book) -->
    <path d="M 140 202 C 152 220 150 238 137 244"
          stroke="#b07848" stroke-width="19" fill="none" stroke-linecap="round"/>
    <path d="M 140 202 C 152 220 150 238 137 244"
          stroke="#e8a87c" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Book (purple, held in lap) -->
    <rect x="60" y="230" width="80" height="48" rx="5" ry="5"
          fill="#7c5cbf" stroke="#5c3fa0" stroke-width="2.5"/>
    <!-- Spine -->
    <line x1="75" y1="230" x2="75" y2="278" stroke="#5c3fa0" stroke-width="2"/>
    <!-- Right page (lighter) -->
    <rect x="77" y="233" width="59" height="41" rx="2" ry="2" fill="#9d80d8" stroke="none"/>
    <!-- Text lines on right page -->
    <line x1="83" y1="243" x2="131" y2="243" stroke="#5c3fa0" stroke-width="1.5" opacity="0.5"/>
    <line x1="83" y1="251" x2="131" y2="251" stroke="#5c3fa0" stroke-width="1.5" opacity="0.5"/>
    <line x1="83" y1="259" x2="131" y2="259" stroke="#5c3fa0" stroke-width="1.5" opacity="0.5"/>
    <line x1="83" y1="267" x2="118" y2="267" stroke="#5c3fa0" stroke-width="1.5" opacity="0.5"/>

    <!-- Left paw (gripping left side of book) -->
    <ellipse cx="62" cy="242" rx="16" ry="10"
             fill="#e8a87c" stroke="#b07848" stroke-width="2.2"/>
    <line x1="55" y1="241" x2="54" y2="247" stroke="#b07848" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="62" y1="243" x2="62" y2="249" stroke="#b07848" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="69" y1="241" x2="70" y2="247" stroke="#b07848" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Right paw (gripping right side of book) -->
    <ellipse cx="138" cy="242" rx="16" ry="10"
             fill="#e8a87c" stroke="#b07848" stroke-width="2.2"/>
    <line x1="131" y1="241" x2="130" y2="247" stroke="#b07848" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="138" y1="243" x2="138" y2="249" stroke="#b07848" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="145" y1="241" x2="146" y2="247" stroke="#b07848" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="100" cy="88" r="47" fill="#e8a87c" stroke="#b07848" stroke-width="3"/>

    <!-- Forehead tabby stripes -->
    <path d="M 88,53 Q 100,51 112,53" stroke="#c87a50" stroke-width="3"
          fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 85,62 Q 100,59 115,62" stroke="#c87a50" stroke-width="2.5"
          fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Ears -->
    <polygon points="62,55 48,17 80,35" fill="#e8a87c" stroke="#b07848" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="65,50 56,25 78,37" fill="#ffb3c6"/>
    <polygon points="138,55 152,17 120,35" fill="#e8a87c" stroke="#b07848" stroke-width="2.5" stroke-linejoin="round"/>
    <polygon points="135,50 144,25 122,37" fill="#ffb3c6"/>

    <!-- Blush cheeks -->
    <ellipse cx="69" cy="101" rx="16" ry="10" fill="#ffb3c6" opacity="0.55"/>
    <ellipse cx="131" cy="101" rx="16" ry="10" fill="#ffb3c6" opacity="0.55"/>

    <!-- Happy closed eyes (U-curve = content squint) -->
    <path d="M 75,84 Q 82,94 90,84" stroke="#7a4a35" stroke-width="3.5"
          fill="none" stroke-linecap="round"/>
    <path d="M 110,84 Q 118,94 126,84" stroke="#7a4a35" stroke-width="3.5"
          fill="none" stroke-linecap="round"/>

    <!-- Nose (heart shape) -->
    <g transform="translate(100, 106)">
      <circle cx="-2.5" cy="-2" r="2.5" fill="#ff9eb5"/>
      <circle cx="2.5"  cy="-2" r="2.5" fill="#ff9eb5"/>
      <polygon points="-4.5,0 4.5,0 0,4.5" fill="#ff9eb5"/>
    </g>

    <!-- Mouth -->
    <path d="M 95,116 Q 100,121 105,116" fill="none"
          stroke="#c06080" stroke-width="2" stroke-linecap="round"/>

    <!-- Whiskers left -->
    <line x1="46" y1="100" x2="86" y2="104" stroke="#c8a080" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="107" x2="86" y2="107" stroke="#c8a080" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="46" y1="114" x2="86" y2="110" stroke="#c8a080" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Whiskers right -->
    <line x1="154" y1="100" x2="114" y2="104" stroke="#c8a080" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="156" y1="107" x2="114" y2="107" stroke="#c8a080" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="154" y1="114" x2="114" y2="110" stroke="#c8a080" stroke-width="1.5" stroke-linecap="round"/>

  </svg>
</body>
</html>
